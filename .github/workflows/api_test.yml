name: Daily Pytest

on:
  schedule:
    # ┌ 분  ┌ 시(UTC)  ┌ 일  ┌ 월  ┌ 요일
    # 0    0          *    *    *   →  매일 UTC 00:00 = 한국시간(KST) 09:00
    - cron: '30 1 * * *'
  workflow_dispatch:    # Actions 탭에서 수동 실행(버튼)도 가능하게

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 테스트 실행
        run: pytest
